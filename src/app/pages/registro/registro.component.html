<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">
      <div class="card p-4 rounded-3">

        <!-- Logo -->
        <div class="text-center mb-4">
          <img src="https://www.micole.net/imagenes/colegio/logo/32624/progresa_200.png"
               alt="Logo" style="width:60px;" class="mb-3">
          <h3 class="fw-bold">Crear Cuenta</h3>
          <p class="text-secondary small">Únete a la comunidad de THE PROGRESA</p>
        </div>

        <!-- Formulario -->
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" class="form-control" placeholder="Tu nombre">
          </div>
          <div class="col-6">
            <label class="form-label fw-bold">Apellidos</label>
            <input type="text" class="form-control" placeholder="Tus apellidos">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Nombre de usuario</label>
          <input type="text" class="form-control form-control-lg" placeholder="usuario123">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Correo electrónico</label>
          <input type="email" class="form-control form-control-lg" placeholder="tu@email.com">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Contraseña</label>
          <input type="password" class="form-control form-control-lg" placeholder="Mínimo 8 caracteres">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Confirmar contraseña</label>
          <input type="password" class="form-control form-control-lg" placeholder="Repite tu contraseña">
        </div>

        <button class="btn btn-primary btn-lg w-100 mb-3">
          <span class="material-symbols-outlined me-2 align-middle">person_add</span>
          Crear cuenta
        </button>

        <hr>

        <!-- Enlace a Login -->
        <div class="text-center">
          <p class="text-secondary mb-2">¿Ya tienes cuenta?</p>
          <div class="form-check d-flex justify-content-center gap-2 mb-3">
            <input class="form-check-input" type="checkbox" id="irLogin">
            <label class="form-check-label" for="irLogin">
              Ya tengo una cuenta
            </label>
          </div>
          <a routerLink="/login" class="btn btn-outline-primary w-100">
            <span class="material-symbols-outlined me-2 align-middle">login</span>
            Ir al Login
          </a>
        </div>

      </div>
    </div>
  </div>
</main>
