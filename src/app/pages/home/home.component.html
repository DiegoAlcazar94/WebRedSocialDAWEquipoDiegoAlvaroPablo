<app-hero></app-hero>

<main class="container-xl mb-5">
  <div class="row g-3 g-md-4">

    <!-- Columna principal -->
    <section class="col-lg-8">

      <!-- Buscador -->
      <div class="card p-3 mb-4 rounded-3">
        <div class="input-group">
          <span class="input-group-text">
            <span class="material-symbols-outlined">search</span>
          </span>
          <input class="form-control" type="search"
                 placeholder="Buscar repositorio, stack o estudiante">
        </div>
        <div class="d-flex flex-wrap gap-2 mt-3">
          <span class="badge bg-primary">All Systems</span>
          <span class="badge bg-secondary">Frontend</span>
          <span class="badge bg-secondary">Backend</span>
          <span class="badge bg-secondary">React</span>
          <span class="badge bg-secondary">Node</span>
        </div>
      </div>

      <!-- Proyectos destacados -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold mb-0">
          <span class="material-symbols-outlined align-middle me-2">star</span>
          Proyectos Destacados
        </h3>
        <a routerLink="/proyectos" class="btn btn-outline-primary btn-sm">Ver todos</a>
      </div>

      <div class="row g-3">
        <div class="col-12 col-sm-6" *ngFor="let project of projects">
          <app-project-card
            [title]="project.title"
            [description]="project.description"
            [image]="project.image"
            [tags]="project.tags"
            [id]="project.id">
          </app-project-card>
        </div>
      </div>
    </section>

    <!-- Sidebar -->
    <aside class="col-lg-4">
      <app-leaderboard></app-leaderboard>

      <!-- Terminal -->
      <div class="terminal">
        <div class="terminal-header">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="ms-2 small">activity_log.sh</span>
        </div>
        <div class="terminal-body">
          <p class="mb-1"><span class="prompt">➜</span> last_commits --watch</p>
          <p class="mb-1"><span class="time">2m</span> public class start (eventArgs e)</p>
          <p class="mb-1"><span class="time">15m</span> position = position * 10;</p>
          <p class="mb-0"><span class="time">1h</span> git push origin main ✓</p>
        </div>
      </div>
    </aside>

  </div>
</main>
