<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">
      <div class="card p-4 rounded-3">

        <!-- Logo -->
        <div class="text-center mb-4">
          <img src="https://www.micole.net/imagenes/colegio/logo/32624/progresa_200.png"
               alt="Logo" style="width:60px;" class="mb-3">
          <h3 class="fw-bold">Iniciar Sesión</h3>
          <p class="text-secondary small">Accede a tu cuenta de THE PROGRESA</p>
        </div>

        <!-- Formulario -->
        <div class="mb-3">
          <label class="form-label fw-bold">Correo electrónico</label>
          <input type="email" class="form-control form-control-lg" placeholder="tu@email.com">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Contraseña</label>
          <input type="password" class="form-control form-control-lg" placeholder="Tu contraseña">
        </div>

        <button class="btn btn-primary btn-lg w-100 mb-3">
          <span class="material-symbols-outlined me-2 align-middle">login</span>
          Entrar
        </button>

        <hr>

        <!-- Enlace a Registro -->
        <div class="text-center">
          <p class="text-secondary mb-2">¿No tienes cuenta?</p>
          <div class="form-check d-flex justify-content-center gap-2 mb-3">
            <input class="form-check-input" type="checkbox" id="irRegistro">
            <label class="form-check-label" for="irRegistro">
              Quiero crear una cuenta nueva
            </label>
          </div>
          <a routerLink="/registro" class="btn btn-outline-primary w-100">
            <span class="material-symbols-outlined me-2 align-middle">person_add</span>
            Ir al Registro
          </a>
        </div>

      </div>
    </div>
  </div>
</main>
