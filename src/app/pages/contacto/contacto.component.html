<main class="container-xl my-4 mb-5">

  <div class="mb-4">
    <h2 class="fw-bold">
      <span class="material-symbols-outlined align-middle me-2">mail</span>
      Contacto
    </h2>
    <p class="text-secondary">¿Tienes alguna duda o propuesta? Escríbenos.</p>
  </div>

  <div class="row g-4">

    <!-- Formulario -->
    <div class="col-lg-7">
      <div class="card p-4 rounded-3">
        <h5 class="fw-bold mb-4">Envíanos un mensaje</h5>

        <div class="mb-3">
          <label class="form-label fw-bold">Nombre</label>
          <input type="text" class="form-control form-control-lg" placeholder="Tu nombre completo">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Correo electrónico</label>
          <input type="email" class="form-control form-control-lg" placeholder="tu@email.com">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Asunto</label>
          <input type="text" class="form-control form-control-lg" placeholder="Asunto del mensaje">
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Mensaje</label>
          <textarea class="form-control" rows="5" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>

        <button class="btn btn-primary btn-lg w-100">
          <span class="material-symbols-outlined me-2 align-middle">send</span>
          Enviar mensaje
        </button>
      </div>
    </div>

    <!-- Info lateral -->
    <div class="col-lg-5">
      <div class="card p-4 rounded-3 mb-3">
        <h5 class="fw-bold mb-3">Progresa Digitech FP</h5>
        <p class="text-secondary mb-2">
          <span class="material-symbols-outlined align-middle me-2">location_on</span>
          Madrid, España
        </p>
        <p class="text-secondary mb-2">
          <span class="material-symbols-outlined align-middle me-2">mail</span>
          contacto&#64;progresa.com
        </p>
        <p class="text-secondary mb-0">
          <span class="material-symbols-outlined align-middle me-2">schedule</span>
          Lunes a Viernes, 9:00 - 18:00
        </p>
      </div>

      <div class="card p-4 rounded-3">
        <h5 class="fw-bold mb-3">Síguenos</h5>
        <div class="d-flex gap-3">
          <a href="#" class="btn btn-outline-primary">GitHub</a>
          <a href="#" class="btn btn-outline-primary">LinkedIn</a>
          <a href="#" class="btn btn-outline-primary">Twitter</a>
        </div>
      </div>
    </div>

  </div>

</main>
